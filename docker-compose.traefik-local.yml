# =============================================================================
# NocoDB - Traefik Local Mode (HTTP + IP-Whitelist)
# =============================================================================
# Usage: docker compose -f docker-compose.traefik-local.yml up -d
#
# Requirements:
#   - External Traefik network (${PROXY_NETWORK})
#   - DNS resolution for ${SERVICE_HOSTNAME}
#   - Traefik entrypoint: web (80)
#
# Security:
#   - HTTP only (no TLS) - use only in trusted networks
#   - Access restricted to IP ranges defined in ${IP_WHITELIST}
#
# Access:
#   - Application: http://${SERVICE_HOSTNAME}
#   - Only from whitelisted IP ranges
# =============================================================================

services:

  ### Application Service ###
  nocodb-server:
    image: ${NOCODB_IMAGE:-ghcr.io/bauer-group/cs-nocodb/nocodb}:${NOCODB_VERSION:-latest}
    restart: unless-stopped
    container_name: ${STACK_NAME}_SERVER
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 15s
      start_period: 60s
      retries: 6
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    environment:
      - TZ=${TIME_ZONE:-Etc/UTC}
      - NC_DB=pg://database-server:5432?u=nocodb&p=${DATABASE_PASSWORD}&d=nocodb
      - NC_APP_DATA_DIR=/usr/app/data
      - NC_SITE_URL=${NC_SITE_URL:-http://${SERVICE_HOSTNAME}}

      # Telemetry & Error-Reporting (zwei getrennte Schalter!)
      # NC_DISABLE_ERR_REPORTS mit Plural-S - die Singular-Form existiert nicht.
      - NC_DISABLE_TELE=true
      - NC_DISABLE_ERR_REPORTS=true
      - NC_DISABLE_SUPPORT_CHAT=true
      - NC_DISABLE_AUDIT=true

      # Auth
      # NC_AUTH_JWT_SECRET: ohne Vorgabe generiert NocoDB eine uuidv4 und legt
      # sie in nc_store ab. Explizit pinnen, damit ein Restore ohne diese Tabelle
      # nicht alle Sessions invalidiert.
      # HINWEIS: "Invite Only Signup" ist KEINE Env-Variable. Das frueher hier
      # gesetzte NC_INVITE_ONLY_SIGNUP wird von NocoDB nirgends gelesen. Der
      # reale Schalter ist das invite_only_signup-Flag in nc_store (Default:
      # false = offene Registrierung) und nur ueber die Super-Admin-UI bzw. die
      # App-Settings-API setzbar.
      - NC_AUTH_JWT_SECRET=${NC_AUTH_JWT_SECRET}
      - NC_JWT_EXPIRES_IN=${NC_JWT_EXPIRES_IN:-12h}

      # Verschluesselung der Credentials externer Datenquellen (sources-Tabelle).
      # BEWUSST NICHT GESETZT - Opt-in, siehe .env.example.
      #
      # Ohne Key bleiben die Credentials im Klartext in der Datenbank (und damit
      # in jedem pg_dump). Das ist der Zustand seit jeher und eine bewusste
      # Abwaegung: das Aktivieren ist IRREVERSIBEL und loest beim Start eine
      # Re-Encrypt-Migration aus, die bei mehreren gleichzeitig startenden
      # Instanzen die Credentials durch Doppelverschluesselung zerstoert.
      #
      # Ein leerer Wert ist sicher: initDataSourceEncryption.ts prueft
      #   if (!process.env.NC_CONNECTION_ENCRYPT_KEY) return;
      # - leerer String ist falsy, die Migration wird also uebersprungen.
      #
      # Aktivieren nur bewusst und nach der Anleitung in .env.example.
      - NC_CONNECTION_ENCRYPT_KEY=${NC_CONNECTION_ENCRYPT_KEY:-}

      # Knex/tarn Connection Pool.
      # Korrekter Variablenname laut NocoDB-Quelltext
      # (utils/nc-config/constants.ts):  pool.max = +NC_DB_POOL_MAX || 10
      # Das frueher hier gesetzte DB_MAX_POOL_SIZE existiert in NocoDB nicht und
      # war wirkungslos - der Pool lag faktisch immer beim Default von 10.
      # Achtung: 0 oder ein Tippfehler ergibt NaN -> stiller Rueckfall auf 10.
      - NC_DB_POOL_MAX=${NC_DB_POOL_MAX:-50}

      # Query & Bulk Operation Limits (NocoDB defaults: 100 - here 1000)
      - DB_QUERY_LIMIT_DEFAULT=${DB_QUERY_LIMIT_DEFAULT:-25}
      - DB_QUERY_LIMIT_MAX=${DB_QUERY_LIMIT_MAX:-1000}
      - DB_QUERY_LIMIT_MIN=${DB_QUERY_LIMIT_MIN:-1}
      - DB_QUERY_LIMIT_GROUP_BY_GROUP=${DB_QUERY_LIMIT_GROUP_BY_GROUP:-10}
      - DB_QUERY_LIMIT_GROUP_BY_RECORD=${DB_QUERY_LIMIT_GROUP_BY_RECORD:-10}
      - NC_DATA_PAYLOAD_LIMIT=${NC_DATA_PAYLOAD_LIMIT:-100000}
      - NC_REQUEST_BODY_SIZE=${NC_REQUEST_BODY_SIZE:-268435456}

      # API Rate Limiting existiert in NocoDB OSS NICHT.
      # Die frueher hier gesetzten NC_RATE_LIMIT_*-Variablen werden nirgends
      # gelesen, und alle drei Limiter-Guards (data-/meta-/public-api-limiter)
      # sind bewusste No-Ops:  async canActivate() { return true; }
      # Upstream verweist dafuer ausdruecklich auf den Reverse Proxy.
      # -> Rate Limiting gehoert in Traefik bzw. in den HAProxy des
      #    Cluster-Stacks (docker-compose.cluster.yml), nicht hierher.

      # SMTP Configuration
      # ACHTUNG Semantik: NC_SMTP_IGNORE_TLS steuert STARTTLS, NICHT die
      # Zertifikatspruefung. Der Schalter dafuer ist NC_SMTP_REJECT_UNAUTHORIZED
      # und steht bei NocoDB per Default auf false (= keine Pruefung).
      - NC_SMTP_HOST=${SMTP_HOST}
      - NC_SMTP_PORT=${SMTP_PORT}
      - NC_SMTP_USERNAME=${SMTP_USER}
      - NC_SMTP_PASSWORD=${SMTP_PASSWORD}
      - NC_SMTP_SECURE=${SMTP_TLS}
      - NC_SMTP_IGNORE_TLS=${SMTP_IGNORE_TLS:-false}
      - NC_SMTP_REJECT_UNAUTHORIZED=${SMTP_CERTCHECK:-true}
      - NC_SMTP_FROM=${SMTP_FROM_NAME} <${SMTP_FROM}>

      # Attachment Settings
      - NC_ATTACHMENT_FIELD_SIZE=${NC_ATTACHMENT_FIELD_SIZE:-268435456}
      - NC_NON_ATTACHMENT_FIELD_SIZE=${NC_NON_ATTACHMENT_FIELD_SIZE:-268435456}
      - NC_MAX_ATTACHMENTS_ALLOWED=${NC_MAX_ATTACHMENTS_ALLOWED:-50}
      - NC_SECURE_ATTACHMENTS=${NC_SECURE_ATTACHMENTS:-false}
      - NC_ATTACHMENT_EXPIRE_SECONDS=${NC_ATTACHMENT_EXPIRE_SECONDS:-7200}

      # S3 Storage (optional - for attachments)
      - NC_S3_BUCKET_NAME=${NC_S3_BUCKET_NAME:-}
      - NC_S3_REGION=${NC_S3_REGION:-}
      - NC_S3_ENDPOINT=${NC_S3_ENDPOINT:-}
      - NC_S3_ACCESS_KEY=${NC_S3_ACCESS_KEY:-}
      - NC_S3_ACCESS_SECRET=${NC_S3_ACCESS_SECRET:-}
      - NC_S3_FORCE_PATH_STYLE=${NC_S3_FORCE_PATH_STYLE:-true}
      - NC_S3_ACL=${NC_S3_ACL:-private}
    expose:
      - 8080/tcp
    labels:
      - "traefik.enable=true"

      # Middleware: IP Allowlist (Traefik v3)
      - "traefik.http.middlewares.${STACK_NAME}-whitelist.ipAllowList.sourcerange=${IP_WHITELIST}"

      # Router: HTTP with IP Whitelist
      - "traefik.http.routers.${STACK_NAME}-web.rule=Host(`${SERVICE_HOSTNAME}`)"
      - "traefik.http.routers.${STACK_NAME}-web.entrypoints=web"
      - "traefik.http.routers.${STACK_NAME}-web.middlewares=${STACK_NAME}-whitelist"
      - "traefik.http.routers.${STACK_NAME}-web.service=${STACK_NAME}"

      # Service
      - "traefik.http.services.${STACK_NAME}.loadBalancer.server.port=8080"
    volumes:
      - nocodb-data:/usr/app/data
    depends_on:
      database-server:
        condition: service_healthy
      nocodb-init:
        condition: service_completed_successfully
    networks:
      local:
      proxy:
        aliases:
          - "${SERVICE_HOSTNAME}.internal"


  ### NocoDB Init Container ###
  # One-shot container that initializes database settings (collation checks)
  # Runs once before nocodb-server starts, then exits
  nocodb-init:
    image: ${NOCODB_INIT_IMAGE:-ghcr.io/bauer-group/cs-nocodb/nocodb-init}:${NOCODB_INIT_VERSION:-latest}
    container_name: ${STACK_NAME}_INIT
    restart: "no"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      # Timezone
      - TZ=${TIME_ZONE:-Etc/UTC}

      # Database Connection
      - DB_HOST=database-server
      - DB_PORT=5432
      - DB_NAME=nocodb
      - DB_USER=nocodb
      - DB_PASSWORD=${DATABASE_PASSWORD}

      # Task Configuration (set to "false" to disable)
      - INIT_COLLATION_CHECK=${INIT_COLLATION_CHECK:-true}
      - INIT_COLLATION_AUTO_FIX=${INIT_COLLATION_AUTO_FIX:-false}
      - INIT_AUDIT_CLEANUP=${INIT_AUDIT_CLEANUP:-true}
    depends_on:
      database-server:
        condition: service_healthy
    networks:
      local:


  ### PostgreSQL Database ###
  # Tuned for SSD/NVMe by default
  # For HDD: Set PG_RANDOM_PAGE_COST=2.0, PG_EFFECTIVE_IO_CONCURRENCY=4 in .env
  database-server:
    image: postgres:${POSTGRES_VERSION:-18}
    restart: unless-stopped
    container_name: ${STACK_NAME}_DATABASE
    command: >
      -c max_connections=${DATABASE_POOLMAXSIZE:-60}
      -c shared_buffers=${PG_SHARED_BUFFERS:-2GB}
      -c work_mem=${PG_WORK_MEM:-8MB}
      -c effective_cache_size=${PG_EFFECTIVE_CACHE_SIZE:-6GB}
      -c maintenance_work_mem=${PG_MAINTENANCE_WORK_MEM:-256MB}
      -c max_wal_size=${PG_MAX_WAL_SIZE:-2GB}
      -c min_wal_size=${PG_MIN_WAL_SIZE:-512MB}
      -c random_page_cost=${PG_RANDOM_PAGE_COST:-1.1}
      -c seq_page_cost=1.0
      -c effective_io_concurrency=${PG_EFFECTIVE_IO_CONCURRENCY:-200}
      -c max_parallel_workers_per_gather=2
      -c max_parallel_workers=4
      -c max_parallel_maintenance_workers=2
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nocodb -d nocodb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    environment:
      - TZ=${TIME_ZONE:-Etc/UTC}
      - PG_TZ=${TIME_ZONE:-Etc/UTC}
      - POSTGRES_DB=nocodb
      - POSTGRES_USER=nocodb
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
    expose:
      - 5432/tcp
    volumes:
      - database-server:/var/lib/postgresql
    networks:
      local:


  ### NocoDB Backup Sidecar (Optional) ###
  # Activate with: docker compose -f docker-compose.traefik-local.yml --profile backup up -d
  nocodb-backup:
    image: ${NOCODB_BACKUP_IMAGE:-ghcr.io/bauer-group/cs-nocodb/nocodb-backup}:${NOCODB_BACKUP_VERSION:-latest}
    container_name: ${STACK_NAME}_BACKUP
    profiles: ["backup"]
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      TZ: ${TIME_ZONE:-Etc/UTC}
      BACKUP_LOG_LEVEL: ${NOCODB_BACKUP_LOG_LEVEL:-INFO}
      BACKUP_LOG_FORMAT: ${NOCODB_BACKUP_LOG_FORMAT:-console}
      # Secrets resolved by the container at runtime (kept out of the rendered config)
      DB_PASSWORD: ${DATABASE_PASSWORD}
      NOCODB_API_TOKEN: ${NOCODB_API_TOKEN:-}
      BACKUP_S3_SECRET_KEY: ${NOCODB_BACKUP_S3_SECRET_KEY:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      WEBHOOK_SECRET: ${NOCODB_BACKUP_WEBHOOK_SECRET:-}
      # NocoDB REST endpoint - also read directly by the `nocodb restore-*` commands
      NOCODB_API_URL: ${NOCODB_API_URL:-http://nocodb-server:8080}
      # BackupHelper engine config. Non-secret values interpolated by compose from
      # .env; secrets use $${VAR} so the engine/plugin resolves them at runtime from
      # the container env (never written into the rendered config).
      BACKUP_CONFIG_JSON: |
        {
          "instance_name": "${NOCODB_BACKUP_INSTANCE_NAME:-${STACK_NAME:-nocodb}}",
          "jobs": [{
            "name": "main",
            "keep_local": ${NOCODB_BACKUP_KEEP_LOCAL_ARCHIVE:-true},
            "sources": [
              {"type": "postgres", "name": "database", "enabled": ${NOCODB_BACKUP_DATABASE_DUMP:-true},
               "host": "database-server", "port": 5432, "database": "nocodb", "user": "nocodb",
               "password": "$${DB_PASSWORD}", "ssl_mode": "disable", "dump_format": "plain",
               "timeout": ${NOCODB_BACKUP_DATABASE_DUMP_TIMEOUT:-1800}},
              {"type": "filesystem", "name": "nocodb-data", "enabled": ${NOCODB_BACKUP_INCLUDE_FILES:-true},
               "path": "/nocodb-data"},
              {"type": "nocodb-rest", "name": "nocodb", "enabled": ${NOCODB_BACKUP_API_EXPORT:-true},
               "api_url": "${NOCODB_API_URL:-http://nocodb-server:8080}", "token": "$${NOCODB_API_TOKEN}",
               "include_records": ${NOCODB_BACKUP_INCLUDE_RECORDS:-true},
               "include_attachments": ${NOCODB_BACKUP_INCLUDE_ATTACHMENTS:-true}}
            ],
            "destinations": [
              {"type": "local"},
              {"type": "s3", "endpoint": "${NOCODB_BACKUP_S3_ENDPOINT_URL:-}", "bucket": "${NOCODB_BACKUP_S3_BUCKET:-}",
               "access_key": "${NOCODB_BACKUP_S3_ACCESS_KEY:-}", "secret_key": "$${BACKUP_S3_SECRET_KEY}",
               "region": "${NOCODB_BACKUP_S3_REGION:-eu-north-1}", "prefix": "${NOCODB_BACKUP_S3_PREFIX:-nocodb/}"}
            ],
            "schedule": {"mode": "${NOCODB_BACKUP_SCHEDULE_MODE:-cron}",
                         "hour": "${NOCODB_BACKUP_SCHEDULE_HOUR:-5}", "minute": "${NOCODB_BACKUP_SCHEDULE_MINUTE:-15}",
                         "day_of_week": "${NOCODB_BACKUP_SCHEDULE_DAY_OF_WEEK:-*}",
                         "interval_hours": ${NOCODB_BACKUP_SCHEDULE_INTERVAL_HOURS:-24},
                         "on_startup": ${NOCODB_BACKUP_ON_STARTUP:-false}},
            "retention": {"count": ${NOCODB_BACKUP_RETENTION_COUNT:-30}},
            "notifications": {
              "channels": "${NOCODB_BACKUP_ALERT_CHANNELS:-}",
              "level": "${NOCODB_BACKUP_ALERT_LEVEL:-warnings}",
              "email": {"host": "${SMTP_HOST:-}", "port": ${SMTP_PORT:-587}, "tls": ${SMTP_TLS:-true},
                        "username": "${SMTP_USER:-}", "password": "$${SMTP_PASSWORD}",
                        "sender": "${SMTP_FROM:-}", "recipients": ["${NOCODB_BACKUP_ALERT_EMAIL:-}"]},
              "webhook": {"url": "${NOCODB_BACKUP_WEBHOOK_URL:-}", "secret": "$${WEBHOOK_SECRET}"},
              "teams": {"url": "${NOCODB_BACKUP_TEAMS_WEBHOOK:-}"}
            }
          }]
        }
    volumes:
      - nocodb-backup-data:/data
      - nocodb-data:/nocodb-data
    depends_on:
      database-server:
        condition: service_healthy
      nocodb-server:
        condition: service_healthy
    networks:
      local:


### Volumes ###
volumes:
  nocodb-data:
    driver: local
    name: ${STACK_NAME}-nocodb

  database-server:
    driver: local
    name: ${STACK_NAME}-postgres

  nocodb-backup-data:
    driver: local
    name: ${STACK_NAME}-nocodb-backup


### Networks ###
networks:
  local:
    driver: bridge
    name: ${STACK_NAME}
    enable_ipv6: true

  proxy:
    name: ${PROXY_NETWORK}
    external: true
